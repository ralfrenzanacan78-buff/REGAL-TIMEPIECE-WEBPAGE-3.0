<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regal Timepiece - Login</title>
    <link rel="icon" type="image/png" sizes="48x48" href="images/icon logo tab.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: url("images/backcover\ home.avif") no-repeat center center/cover; /* Placeholder hero image */
            color: #ecf0f1; /* Light gray text */
            line-height: 1.6;
        }

        /* Global Styles */
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px 0;
        }

        a {
            text-decoration: none;
            color: #e67e22;
        }

        a:hover {
            color: #d35400;
        }

        /* Header */
        header {
            background: #34495e; /* Slightly darker header */
            color: #ffffff;
            padding-top: 20px;
            min-height: 70px;
            border-bottom: #e67e22 3px solid; /* Orange accent */
            text-align: center;
        }
        header h1 {
            margin: 0;
            padding-bottom: 10px;
            font-size: 2.5em;
        }
        nav ul {
            padding: 0;
            list-style: none;
            margin: 0;
        }
        nav ul li {
            display: inline;
            padding: 0 15px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 16px;
        }
        nav a:hover {
            color: #e67e22; /* Orange on hover */
            font-weight: bold;
        }

        /* Form Styles */
        .login-container {
            width: 50%;
            margin: 50px auto;
            background: rgba(69, 69, 69, 0.5); /* Dark overlay */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-container h2 {
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 2em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #ecf0f1;
            margin-bottom: 8px;
            font-size: 1.1em;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #4a637f;
            border-radius: 5px;
            background: rgba(69, 69, 69, 0.5); /* Dark overlay */
            color: #ecf0f1;
            font-size: 1em;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 5px rgba(230, 126, 34, 0.5);
        }
        .button {
            display: inline-block;
            color: #ffffff;
            background: #e67e22; /* Orange button */
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease, transform 0.3s ease;
            font-weight: bold;
            font-size: 1.1em;
            border: none;
            cursor: pointer;
        }
        .button:hover {
            background: #d35400; /* Darker orange on hover */
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            background: #2c3e50;
            color: #ecf0f1;
            margin-top: 40px;
            border-top: #e67e22 3px solid;
            font-size: 0.9em;
        }
        footer p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>Regal Timepiece</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="collection-section.html">Collection</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="login-container">
        <h2>LOGIN</h2>
        <form action="#" method="post">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="button">Login</button>
        </form>
        <p style="margin-top: 20px;">Don't have an account? <a href="#" style="color: #e67e22;">Sign up</a></p>
    </div>

    <footer>
        <p>&copy; 2026 Regal Timepiece. All rights reserved.</p>
        <p>Email: info@regaltimepiece.com | Phone: +63 998 546 123</p>
        <p>Follow us on <a href="#" style="color: #e67e22;">Instagram</a> and <a href="#" style="color: #e67e22;">Facebook</a></p>
    </footer>

</body>
</html>
